spring.application.name=sports-booking

# PostgreSQL (local: install Postgres, create DB sports_booking; Docker can override via env)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sports_booking}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Dipti@29}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# H2 alternative (no Postgres): uncomment below and comment the PostgreSQL block above.
# spring.datasource.url=jdbc:h2:file:./data/sports_booking;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=${JWT_SECRET:5c8a7e9f2b3d4e6f1a0c9b8d7e6f5a4b3c2d1e0f9a8b7c6d5e4f3a2b1c0d9e8f7}
jwt.expiration=86400000

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Logging
logging.level.com.kalpesh=DEBUG
logging.level.org.springframework.security=INFO
